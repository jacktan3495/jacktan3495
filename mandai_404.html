<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Night Safari Encounter</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            font-family: 'Montserrat', sans-serif;
            background-color: #020b02; 
            color: #ffffff;
        }

        /* LAYER 1: The Jungle Background */
        .jungle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/background.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: brightness(0.5); 
        }

        /* LAYER 2: The Darkness (Flashlight Overlay) */
        #flashlight-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; 
            z-index: 10;
            /* The hole follows the CSS variables set by JavaScript */
            background: radial-gradient(
                circle 300px at var(--cursor-x, 50%) var(--cursor-y, 50%),
                transparent 20%,
                rgba(0, 0, 0, 0.8) 70%,
                rgba(0, 0, 0, 0.95) 100%
            );
        }

        /* LAYER 3: The Content (Header, Animals, Button) */
        .content {
            position: relative;
            z-index: 5; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        .text-header h1 { 
            font-size: 4rem; 
            margin: 0; 
            color: #d4e157; 
            text-shadow: 2px 2px 20px rgba(0,0,0,0.9); 
        }
        
        .text-header h2 { font-size: 1.4rem; margin: 5px 0; }

        /* Spread out Grid for the 4 Animals */
        .encounter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            column-gap: 150px; 
            row-gap: 60px; 
            max-width: 1000px; 
            width: 100%;
            margin-top: 20px;
            margin-bottom: 80px; 
        }

        .animal-encounter {
            position: relative;
            background: rgba(10, 20, 10, 0.6); 
            width: 240px; 
            height: 240px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(212, 225, 87, 0.4);
            pointer-events: auto; 
            transition: transform 0.3s ease;
        }

        .animal-encounter:hover {
            transform: scale(1.05);
            border-color: #d4e157;
        }

        .animal-encounter img {
            width: 80%;
            height: 80%;
            object-fit: contain; 
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .encounter-label {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(67, 160, 71, 1); 
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem; 
            white-space: nowrap;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        /* Navigation Button (Fixed at Bottom) */
        .fixed-button-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999; 
            pointer-events: all; 
        }

        .btn-back {
            display: block;
            padding: 14px 50px;
            background-color: #43a047;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            border: 2px solid #d4e157;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: #d4e157;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="jungle-bg"></div>
    <div id="flashlight-overlay"></div>

    <div class="content">
        <div class="text-header">
            <h1>404</h1>
            <h2>Oops! You've wandered off the trail.</h2>
        </div>
        
        <div class="encounter-grid">
            <div class="animal-encounter">
                <img src="images/leopard.jpg" alt="Leopard">
                <div class="encounter-label">You found the Clouded Leopard!</div>
            </div>
            <div class="animal-encounter">
                <img src="images/pangolin.jpg" alt="Pangolin">
                <div class="encounter-label">You found the Sunda Pangolin!</div>
            </div>
            <div class="animal-encounter">
                <img src="images/tasmanian_devil.jpg" alt="Tasmanian Devil">
                <div class="encounter-label">You found the Tasmanian Devil!</div>
            </div>
            <div class="animal-encounter">
                <img src="images/tiger.jpg" alt="Tiger">
                <div class="encounter-label">You found the Malayan Tiger!</div>
            </div>
        </div>
    </div>

    <div class="fixed-button-container">
        <a href="https://www.mandai.com/en/singapore-zoo.html" class="btn-back">Back to Entrance</a>
    </div>

    <script>
        const overlay = document.getElementById('flashlight-overlay');

        const handleFlashlight = (e) => {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (clientX && clientY) {
                const x = (clientX / window.innerWidth) * 100;
                const y = (clientY / window.innerHeight) * 100;

                overlay.style.setProperty('--cursor-x', x + '%');
                overlay.style.setProperty('--cursor-y', y + '%');
            }
        };

        document.addEventListener('mousemove', handleFlashlight);
        document.addEventListener('touchmove', handleFlashlight);
    </script>
</body>
</html>
