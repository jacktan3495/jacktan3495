<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Night Safari Encounter</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #020b02; 
            color: #ffffff;
        }

        .jungle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/background.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: brightness(0.25); 
        }

        #flashlight-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; 
            z-index: 10;
            background: radial-gradient(
                circle 250px at var(--cursor-x, 50%) var(--cursor-y, 50%),
                transparent 0%,
                rgba(0, 0, 0, 0.96) 80%,
                rgba(0, 0, 0, 1) 100%
            );
        }

        .content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 5rem; margin: 0; color: #d4e157; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); }
        h2 { font-size: 1.6rem; margin: 0; margin-bottom: 5px; }

        .encounter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px;
            margin: 20px 0;
            max-width: 750px; 
            width: 100%;
        }

        .animal-encounter {
            position: relative;
            background: #0a0e0a; 
            width: 280px; 
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(212, 225, 87, 0.2);
            transition: all 0.4s ease;
            pointer-events: auto;
        }

        .animal-encounter:hover {
            border: 2px solid #d4e157;
            transform: scale(1.05);
            background: #000;
        }

        .animal-encounter img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(212, 225, 87, 0.2)); 
        }

        .encounter-label {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(67, 160, 71, 0.95);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem; 
            white-space: nowrap;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-weight: 600;
        }

        .btn-back {
            padding: 12px 40px;
            background-color: #43a047;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            margin-top: 15px;
            pointer-events: auto;
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: transparent;
            border: 2px solid #d4e157;
            color: #d4e157;
        }
    </style>
</head>
<body>

    <div class="jungle-bg"></div>
    <div id="flashlight-overlay"></div>

    <div class="content">
        <div class="text-header">
            <h1>404</h1>
            <h2>Oops! You've wandered off the trail.</h2>
        </div>
        
        <div class="encounter-grid">
            <div class="animal-encounter">
                <img src="images/leopard.jpg" alt="Leopard">
                <div class="encounter-label">You found the Clouded Leopard!</div>
            </div>

            <div class="animal-encounter">
                <img src="images/pangolin.jpg" alt="Pangolin">
                <div class="encounter-label">You found the Sunda Pangolin!</div>
            </div>

            <div class="animal-encounter">
                <img src="images/tasmanian_devil.jpg" alt="Tasmanian Devil">
                <div class="encounter-label">You found the Tasmanian Devil!</div>
            </div>

            <div class="animal-encounter">
                <img src="images/tiger.jpg" alt="Tiger">
                <div class="encounter-label">You found the Malayan Tiger!</div>
            </div>
        </div>

        <a href="https://www.mandai.com/en/singapore-zoo.html" class="btn-back">Back to Entrance</a>
    </div>

    <script>
        const overlay = document.getElementById('flashlight-overlay');
        const moveFlashlight = (e) => {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            if (clientX && clientY) {
                const x = (clientX / window.innerWidth) * 100;
                const y = (clientY / window.innerHeight) * 100;
                overlay.style.setProperty('--cursor-x', x + '%');
                overlay.style.setProperty('--cursor-y', y + '%');
            }
        };
        document.addEventListener('mousemove', moveFlashlight);
        document.addEventListener('touchmove', moveFlashlight);
    </script>
</body>
</html>
